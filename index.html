<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Website</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
}

#content {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.message {
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    color: #000;
    padding: 30px;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

// ----------------------
// TEST MODE
// ----------------------
// Add one of these:
//
// ?test=active
// ?test=before
// ?test=expired
//
// Example:
// https://hushmn.github.io/portal/?test=active
// ----------------------

const content = document.getElementById("content");

const params = new URLSearchParams(window.location.search);
const test = params.get("test");

if (test === "active") {
    showFlyer();
} else if (test === "before") {
    showBefore();
} else if (test === "expired") {
    showExpired();
} else {
    runLiveMode();
}

function runLiveMode() {

    // Current time in Chicago
    const now = new Date();

    const chicago = new Date(
        now.toLocaleString("en-US", {
            timeZone: "America/Chicago"
        })
    );

    // Event Window
    const start = new Date(2026, 6, 10, 22, 0, 0); // July 10 10PM
    const end   = new Date(2026, 6, 11, 4, 0, 0);  // July 11 4AM

    if (chicago < start) {
        showBefore();
    }
    else if (chicago >= start && chicago < end) {
        showFlyer();
    }
    else {
        showExpired();
    }

}

function showFlyer() {
    content.innerHTML = `
        <img src="flyer.PNG" alt="Flyer">
    `;
}

function showBefore() {
    content.innerHTML = `
        <div class="message">
            Website Not Available
        </div>
    `;
}

function showExpired() {
    content.innerHTML = `
        <div class="message">
            Website Has Expired
        </div>
    `;
}

</script>

</body>
</html>
