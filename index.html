<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:100%;
}

#content{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.message{
    font-size:34px;
    font-weight:bold;
    color:#000;
    text-align:center;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

const content = document.getElementById("content");

// ---------- TEST MODE ----------
const params = new URLSearchParams(window.location.search);
const test = params.get("test");

if(test==="active"){
    showFlyer();
}
else if(test==="before"){
    showBefore();
}
else if(test==="expired"){
    showExpired();
}
else{

    // ---------- LIVE MODE ----------

    const now = new Date();

    // Current time in Central Time
    const centralNow = new Date(
        now.toLocaleString("en-US",{timeZone:"America/Chicago"})
    );

    // EVENT WINDOW
    // Friday July 10 2026 10:00 PM
    const start = new Date(2026,6,10,22,0,0);

    // Saturday July 11 2026 4:00 AM
    const end = new Date(2026,6,11,4,0,0);

    if(centralNow < start){
        showBefore();
    }
    else if(centralNow >= start && centralNow < end){
        showFlyer();
    }
    else{
        showExpired();
    }

}

function showFlyer(){
    content.innerHTML='<img src="flyer.jpg" alt="Flyer">';
}

function showBefore(){
    content.innerHTML='<div class="message">Website Not Available</div>';
}

function showExpired(){
    content.innerHTML='<div class="message">Website Has Expired</div>';
}

</script>

</body>
</html>
