<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Website</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

#content{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.message{
    font-size:38px;
    font-weight:bold;
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

// ------------------------------------
// TEST MODE
// ------------------------------------
//
// ?test=active
// ?test=before
// ?test=expired
//
// Example:
// https://hushmn.github.io/portal/?test=active
//
// ------------------------------------

const params = new URLSearchParams(window.location.search);
const test = params.get("test");

const content = document.getElementById("content");

if(test==="active"){
    showFlyer();
}
else if(test==="before"){
    showBefore();
}
else if(test==="expired"){
    showExpired();
}
else{
    runLiveMode();
}

// Refresh automatically every minute
setInterval(runLiveMode,60000);

function runLiveMode(){

    // Current date/time in Chicago
    const formatter = new Intl.DateTimeFormat("en-US",{
        timeZone:"America/Chicago",
        year:"numeric",
        month:"numeric",
        day:"numeric",
        hour:"numeric",
        minute:"numeric",
        second:"numeric",
        hour12:false
    });

    const parts = formatter.formatToParts(new Date());

    const values={};

    parts.forEach(p=>{
        if(p.type!=="literal"){
            values[p.type]=parseInt(p.value);
        }
    });

    const year=values.year;
    const month=values.month;
    const day=values.day;
    const hour=values.hour;

    let active=false;

    // Friday July 10 2026 after 10PM
    if(
        year===2026 &&
        month===7 &&
        day===10 &&
        hour>=22
    ){
        active=true;
    }

    // Saturday July 11 2026 before 4AM
    if(
        year===2026 &&
        month===7 &&
        day===11 &&
        hour<4
    ){
        active=true;
    }

    if(active){
        showFlyer();
    }
    else{

        // Before event
        if(
            year<2026 ||
            (year===2026 && month<7) ||
            (year===2026 && month===7 && day<10) ||
            (year===2026 && month===7 && day===10 && hour<22)
        ){
            showBefore();
        }
        else{
            showExpired();
        }

    }

}

function showFlyer(){

    content.innerHTML=`
        <img src="flyer.PNG" alt="Flyer">
    `;

}

function showBefore(){

    content.innerHTML=`
        <div class="message">
            Website Not Available
        </div>
    `;

}

function showExpired(){

    content.innerHTML=`
        <div class="message">
            Website Has Expired
        </div>
    `;

}

</script>

</body>
</html>
