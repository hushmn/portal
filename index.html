<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

img{
    width:100%;
    max-width:700px;
    height:auto;
}

.message{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#000;
}
</style>

</head>

<body>

<div id="content"></div>

<script>

// CENTRAL TIME (America/Chicago)
const now = new Date();

const formatter = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    year:'numeric',
    month:'numeric',
    day:'numeric',
    hour:'numeric',
    minute:'numeric',
    second:'numeric',
    hour12:false
});

const parts = formatter.formatToParts(now);

const get = t => parts.find(p=>p.type===t).value;

const year = Number(get('year'));
const month = Number(get('month'));
const day = Number(get('day'));
const hour = Number(get('hour'));
const minute = Number(get('minute'));

const content=document.getElementById("content");

// ===== CHANGE THESE DATES FOR YOUR EVENT =====
// Friday July 10 after 10PM until Saturday July 11 4AM

let showFlyer=false;

if(month===7){

// Friday July 10 after 22:00
if(day===10 && (hour>=22)){
showFlyer=true;
}

// Saturday July 11 before 4AM
if(day===11 && hour<4){
showFlyer=true;
}

}

if(showFlyer){

content.innerHTML='<img src="flyer.jpg">';

}else{

content.innerHTML='<div class="message">Website Has Expired</div>';

}

</script>

</body>
</html>
