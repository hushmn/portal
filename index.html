<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#ffffff;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#content{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.message{
    font-size:36px;
    font-weight:bold;
    color:#000;
    text-align:center;
}
</style>
</head>

<body>

<div id="content"></div>

<script>

const content = document.getElementById("content");

// -------------------------
// TEST MODE
// -------------------------
// Add one of these to the end of your URL:
//
// ?test=active
// ?test=before
// ?test=expired
//
// Example:
// https://hushmn.github.io/portal/?test=active
// -------------------------

const params = new URLSearchParams(window.location.search);
const test = params.get("test");

if(test === "active"){
    showFlyer();
}
else if(test === "before"){
    showBefore();
}
else if(test === "expired"){
    showExpired();
}
else{
    runLiveMode();
}

function runLiveMode(){

    // Current time in Central Time
    const now = new Date();

    const centralNow = new Date(
        now.toLocaleString("en-US", {
            timeZone: "America/Chicago"
        })
    );

    // Event window
    const start = new Date(2026, 6, 10, 22, 0, 0); // July 10, 10 PM
    const end   = new Date(2026, 6, 11, 4, 0, 0);  // July 11, 4 AM

    if(centralNow < start){
        showBefore();
    }
    else if(centralNow >= start && centralNow < end){
        showFlyer();
    }
    else{
        showExpired();
    }

}

function showFlyer(){
    content.innerHTML = `
        <img src="flyer.png" alt="Flyer">
    `;
}

function showBefore(){
    content.innerHTML = `
        <div class="message">
            Website Not Available
        </div>
    `;
}

function showExpired(){
    content.innerHTML = `
        <div class="message">
            Website Has Expired
        </div>
    `;
}

</script>

</body>
</html>
