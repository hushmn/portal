<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

img{
    width:100%;
    max-width:700px;
    height:auto;
}

.message{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    color:#000;
}
</style>

</head>

<body>

<div id="content"></div>

<script>
const content = document.getElementById("content");

// Current time in Central Time
const now = new Date();
const centralNow = new Date(
  now.toLocaleString("en-US", { timeZone: "America/Chicago" })
);

// Event window (2026)
const start = new Date("2026-07-10T22:00:00");
const end   = new Date("2026-07-11T04:00:00");

if (centralNow < start) {
  content.innerHTML =
    '<div class="message">Website Not Available</div>';
} else if (centralNow >= start && centralNow < end) {
  content.innerHTML =
    '<img src="flyer.jpg" alt="Flyer">';
} else {
  content.innerHTML =
    '<div class="message">Website Has Expired</div>';
}
</script>

</body>
</html>
